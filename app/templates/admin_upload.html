<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - Easy 13F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>body { font-family: "Pretendard Variable", Pretendard, sans-serif; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">📸 인사이트 업로드</h1>
        
        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">제목 (카드 뉴스 주제)</label>
                <input type="text" id="title" name="title" placeholder="예: 2025년 3분기 버핏 요약" 
                       class="w-full border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">이미지 파일</label>
                <input type="file" id="file" name="file" accept="image/*" 
                       class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                업로드 하기 🚀
            </button>
        </form>

        <div id="result" class="mt-4 text-center text-sm font-medium hidden"></div>
        <a href="/" class="block mt-6 text-center text-gray-400 text-sm hover:text-gray-600">메인으로 돌아가기</a>
    </div>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append("title", document.getElementById("title").value);
            formData.append("file", document.getElementById("file").files[0]);

            const res = await fetch("/api/v1/insights/admin/upload", {
                method: "POST",
                body: formData
            });

            const resultDiv = document.getElementById("result");
            resultDiv.classList.remove("hidden");
            
            if (res.ok) {
                resultDiv.innerText = "✅ 업로드 완료! 메인 페이지에서 확인하세요.";
                resultDiv.className = "mt-4 text-center text-sm font-medium text-green-600";
                setTimeout(() => location.href = "/", 1500); // 1.5초 뒤 메인으로 이동
            } else {
                resultDiv.innerText = "🔥 실패했습니다. 다시 시도해주세요.";
                resultDiv.className = "mt-4 text-center text-sm font-medium text-red-600";
            }
        });
    </script>
</body>
</html>
