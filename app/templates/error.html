<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 발생 - Easy 13F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>body { font-family: "Pretendard Variable", Pretendard, sans-serif; }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 flex items-center justify-center min-h-screen">
    <div class="text-center p-8">
        <div class="text-6xl mb-4">😵</div>
        <h1 class="text-2xl font-bold mb-2">죄송합니다. 오류가 발생했습니다.</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8">{{ message }}</p>
        
        <a href="/" class="px-6 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition">
            홈으로 돌아가기
        </a>
    </div>
</body>
</html>
